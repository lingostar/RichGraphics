name: RichGraphics
options:
  bundleIdPrefix: com.mentorLingo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
targets:
  RichGraphics:
    type: application
    platform: iOS
    sources:
      - RichGraphics
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mentorLingo.RichGraphics
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: "4QG3GC35LA"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "Camera access is used for real-time filter effects"
        INFOPLIST_KEY_NSMotionUsageDescription: "Motion data is used to control gravity direction in physics simulations"
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
