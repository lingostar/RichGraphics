name: RichGraphics
options:
  bundleIdPrefix: com.lingostar
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
targets:
  RichGraphics:
    type: application
    platform: iOS
    sources:
      - RichGraphics
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lingostar.RichGraphics
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: "Lingostar"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "Camera access is used for real-time filter effects"
        INFOPLIST_KEY_NSMotionUsageDescription: "Motion data is used to control gravity direction in physics simulations"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
